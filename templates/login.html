<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · DNS Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23EDEDED' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M17.5 19c9-2.5 4-13-3-10C13 2 4 4 4 10c-5.5 3 .5 11 6.5 9'%3E%3C/path%3E%3C/svg%3E">

  <link rel="stylesheet" href="/static/css/style.css">

  <style>
    /* Mensagem de erro inline */
    .auth-error {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body data-theme="dark">

  <div class="bg-glow"></div>
  <div class="bg-noise"></div>

  <div class="theme-toggle-wrapper">
    <button class="btn-icon theme-btn" id="theme-toggle" aria-label="Alternar tema">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>

  <main class="auth-layout">
    <section class="auth-card">
      <header class="auth-header">
        <div class="logo justify-center mb-6">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
          <span class="logo-text" style="font-size: 1.25rem;">DNS Manager</span>
        </div>
        <h1 class="auth-title">Bem-vindo de volta</h1>
        <p class="auth-subtitle">Insira suas credenciais para acessar o painel</p>
      </header>

      <!-- FIX: method POST + action /login para passar pelo backend -->
      <form class="auth-form" method="POST" action="/login" autocomplete="off">

        <!-- Mensagem de erro vinda do backend (via Jinja2) -->
        {% if error %}
        <div class="auth-error">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ error }}
        </div>
        {% endif %}

        <div class="form-group">
          <label class="form-label" for="email">E-mail corporativo</label>
          <input
            type="email"
            class="input"
            id="email"
            name="email"
            placeholder="nome@suaempresa.com.br"
            required
            autofocus
          >
        </div>

        <div class="form-group">
          <div class="flex-between">
            <label class="form-label" for="password">Senha</label>
            <a href="#" class="auth-link">Esqueceu a senha?</a>
          </div>
          <input
            type="password"
            class="input"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Entrar na conta
        </button>

      </form>

      <footer class="auth-footer">
        <p>Ainda não tem acesso? <a href="#" class="auth-link font-medium">Fale com o suporte</a></p>
      </footer>
    </section>
  </main>

  <script src="/static/js/theme.js"></script>
</body>
</html>
